<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 16px;
      background-color: #020617; /* slate-950 */
      color: #f8fafc; /* slate-50 */
      font-family: system-ui, -apple-system, sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .logo-glow {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
    }
    .title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.025em;
    }
    .status-container {
      background-color: #0f172a; /* slate-900 */
      border: 1px border #1e293b; /* slate-800 */
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 16px;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #94a3b8;
    }
    .status-dot.online {
      background-color: #10b981; /* emerald-500 */
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
    }
    .status-dot.offline {
      background-color: #ef4444; /* red-500 */
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background-color: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 6px;
      padding: 8px;
      color: #f8fafc;
      font-size: 11px;
      outline: none;
      transition: border-color 0.15s ease;
    }
    input:focus {
      border-color: #6366f1;
    }
    .btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      background: linear-gradient(135deg, #4f46e5, #4338ca);
      color: white;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s ease;
      border: none;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #1e293b;
      color: #94a3b8;
      margin-top: 8px;
    }
    .btn-secondary:hover {
      background-color: #0f172a;
      color: #f8fafc;
    }
    .footer {
      text-align: center;
      font-size: 9px;
      color: #64748b;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-glow">T</div>
    <div class="title">TnC Bot Utility</div>
  </div>

  <div style="margin-bottom: 16px;">
    <button id="activate-btn" class="btn" style="background: linear-gradient(135deg, #10b981, #059669); font-size: 12px; padding: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <span>Show Assistant on Page</span>
    </button>
  </div>

  <div class="status-container">
    <span>Backend Connection Status:</span>
    <div style="display: flex; align-items: center; gap: 6px;">
      <span id="status-text" style="font-weight: 600; color: #94a3b8;">Checking...</span>
      <div id="status-dot" class="status-dot"></div>
    </div>
  </div>

  <div class="form-group" style="display: none;">
    <label for="backend-url">Backend API Base URL</label>
    <input type="text" id="backend-url" value="https://tnc-bot.vercel.app" placeholder="https://tnc-bot.vercel.app">
  </div>

  <button id="save-btn" class="btn" style="display: none;">Save & Apply Settings</button>
  <a id="workspace-link" href="https://tnc-bot.vercel.app" target="_blank" class="btn btn-secondary" style="display: none;">Open Full Workspace</a>

  <div class="footer">
    TnC Bot Chrome Assistant v1.0.0
  </div>

  <script src="popup.js"></script>
</body>
</html>
